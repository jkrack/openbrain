name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner for Swift + Neural Engine build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build plugin
        run: npm run build

      - name: Build STT daemon
        run: |
          cd swift/openbrain-stt
          swift build -c release
          cp .build/release/openbrain-stt ../../openbrain-stt-macos-arm64

      - name: Zip STT daemon
        run: zip openbrain-stt-macos-arm64.zip openbrain-stt-macos-arm64

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
            floatingRecorder.html
            ort-wasm-simd-threaded.wasm
            ort-wasm-simd-threaded.jsep.wasm
            openbrain-stt-macos-arm64.zip
