<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --accent: #e8a030;
    --accent-glow: rgba(232, 160, 48, 0.5);
    --accent-dim: rgba(232, 160, 48, 0.12);
    --text-muted: #666;
    --bg-dark: #0d1520;
    --bg-darker: #111b28;
    --border: rgba(255, 180, 60, 0.12);
  }
  html, body {
    background: transparent;
    overflow: visible;
    user-select: none;
  }

  /* --- Pill recorder --- */
  .recorder {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    min-width: 280px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--bg-dark), var(--bg-darker));
    border: 1px solid var(--border);
    position: relative;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  /* Ambient glow */
  .recorder::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 15% 50%, rgba(232, 160, 48, 0.06), transparent 60%);
    pointer-events: none;
  }

  /* Beacon */
  .beacon {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    flex-shrink: 0;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-glow); }
    50% { opacity: 0.4; box-shadow: 0 0 4px rgba(232, 160, 48, 0.2); }
  }

  /* Timer */
  .timer {
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    font-size: 13px;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    letter-spacing: 1.5px;
    flex-shrink: 0;
    min-width: 36px;
  }

  /* Segment badge */
  .seg {
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    font-size: 9px;
    color: rgba(232, 160, 48, 0.5);
    background: rgba(232, 160, 48, 0.08);
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* VU Meter */
  .meter {
    flex: 1;
    height: 16px;
    min-width: 60px;
  }
  .meter svg {
    width: 100%;
    height: 16px;
    display: block;
  }
  .meter rect {
    fill: var(--accent);
    opacity: 0.6;
  }

  /* Stop button */
  .stop-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: rgba(255, 180, 60, 0.06);
    cursor: pointer;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
    transition: all 0.15s ease;
  }
  .stop-btn:hover {
    background: rgba(255, 180, 60, 0.12);
    border-color: rgba(255, 180, 60, 0.3);
  }
  .stop-icon {
    width: 8px;
    height: 8px;
    border-radius: 1.5px;
    background: var(--accent);
  }

  /* Stopping state */
  .state-stopping .beacon { animation: none; opacity: 0.3; }
  .state-stopping .timer { opacity: 0.5; }
  .state-stopping .meter rect { opacity: 0.15; }
  .state-stopping .stop-btn { pointer-events: none; opacity: 0.5; }
</style>
</head>
<body>
<div class="recorder" id="recorder">
  <div class="beacon" id="beacon"></div>
  <span class="timer" id="timer">0:00</span>
  <span class="seg" id="seg" style="display:none"></span>
  <div class="meter" id="meter">
    <svg id="meterSvg" viewBox="0 0 120 16" preserveAspectRatio="none"></svg>
  </div>
  <button class="stop-btn" id="stopBtn" title="Stop">
    <span class="stop-icon"></span>
  </button>
</div>

<script>
  const { ipcRenderer } = require('electron');
  const fs = require('fs');
  const path = require('path');

  // --- State ---
  let mediaRecorder = null;
  let analyser = null;
  let audioCtx = null;
  let stream = null;
  let chunks = [];
  let duration = 0;
  let segmentElapsed = 0;
  let segmentCount = 0;
  let timerInterval = null;
  let animFrame = 0;
  let segmentDuration = 300;
  let deviceId = '';
  let mimeType = 'audio/webm';
  let sessionDir = '';
  const NUM_BARS = 30;

  // --- DOM refs ---
  const timerEl = document.getElementById('timer');
  const segEl = document.getElementById('seg');
  const meterSvg = document.getElementById('meterSvg');
  const recorderEl = document.getElementById('recorder');

  // Pre-build SVG bars
  const bars = [];
  for (let i = 0; i < NUM_BARS; i++) {
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    const x = (i / NUM_BARS) * 120;
    const w = Math.max(120 / NUM_BARS - 0.8, 1);
    rect.setAttribute('x', x.toString());
    rect.setAttribute('y', '7');
    rect.setAttribute('width', w.toString());
    rect.setAttribute('height', '2');
    rect.setAttribute('rx', '0.5');
    meterSvg.appendChild(rect);
    bars.push(rect);
  }

  // --- Session JSON helpers ---
  function readSessionJson() {
    return JSON.parse(fs.readFileSync(path.join(sessionDir, 'session.json'), 'utf-8'));
  }
  function writeSessionJson(data) {
    fs.writeFileSync(path.join(sessionDir, 'session.json'), JSON.stringify(data, null, 2));
  }
  function addSegmentToDisk(wavBuffer, segDuration) {
    const session = readSessionJson();
    const index = session.segments.length + 1;
    const filename = `segment-${String(index).padStart(3, '0')}.wav`;
    fs.writeFileSync(path.join(sessionDir, filename), Buffer.from(wavBuffer));
    session.segments.push({ file: filename, duration: segDuration, transcription: null });
    writeSessionJson(session);
  }

  // --- Theme injection ---
  function applyTheme(theme) {
    if (!theme) return;
    const root = document.documentElement;
    if (theme.bgPrimary) root.style.setProperty('--bg-dark', theme.bgPrimary);
    if (theme.bgSecondary) root.style.setProperty('--bg-darker', theme.bgSecondary);
    if (theme.border) root.style.setProperty('--border', theme.border);
  }

  // --- Init ---
  ipcRenderer.on('recorder:config', (_e, config) => {
    segmentDuration = config.segmentDuration || 300;
    deviceId = config.deviceId || '';
    sessionDir = config.sessionDir || '';
    applyTheme(config.theme);
    startRecording();
  });

  // --- Recording ---
  async function startRecording() {
    try {
      const constraints = deviceId
        ? { audio: { deviceId: { exact: deviceId } } }
        : { audio: true };
      try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
      } catch {
        if (deviceId) {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } else {
          throw new Error('Mic unavailable');
        }
      }

      audioCtx = new AudioContext();
      await audioCtx.resume();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);

      mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : 'audio/webm';

      startMediaRecorder();
      startTimer();
      updateMeter();
    } catch (err) {
      console.error('Recording failed:', err);
      timerEl.textContent = 'Mic error';
      setTimeout(() => window.close(), 3000);
    }
  }

  function startMediaRecorder() {
    chunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    mediaRecorder.start(250);
  }

  function finalizeSegment() {
    return new Promise((resolve) => {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        resolve(new Blob([], { type: mimeType }));
        return;
      }
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: mimeType });
        chunks = [];
        resolve(blob);
      };
      mediaRecorder.stop();
    });
  }

  async function rotateSegment() {
    const blob = await finalizeSegment();
    if (blob.size > 0) {
      segmentCount++;
      segEl.textContent = segmentCount;
      segEl.style.display = '';
      try {
        const wavBuffer = await blobToWavBuffer(blob);
        addSegmentToDisk(wavBuffer, segmentElapsed);
      } catch (err) {
        console.error('Segment save failed:', err);
      }
    }
    if (stream && stream.active) {
      segmentElapsed = 0;
      startMediaRecorder();
    }
  }

  // --- WAV conversion ---
  async function blobToWavBuffer(blob) {
    const arrayBuffer = await blob.arrayBuffer();
    const tempCtx = new OfflineAudioContext(1, 1, 16000);
    const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
    const targetRate = 16000;
    const numSamples = Math.ceil(audioBuffer.duration * targetRate);
    const offlineCtx = new OfflineAudioContext(1, numSamples, targetRate);
    const source = offlineCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(offlineCtx.destination);
    source.start(0);
    const rendered = await offlineCtx.startRendering();
    const samples = rendered.getChannelData(0);
    const bytesPerSample = 2;
    const dataSize = samples.length * bytesPerSample;
    const buffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(buffer);
    let o = 0;
    writeStr(view, o, 'RIFF'); o += 4;
    view.setUint32(o, 36 + dataSize, true); o += 4;
    writeStr(view, o, 'WAVE'); o += 4;
    writeStr(view, o, 'fmt '); o += 4;
    view.setUint32(o, 16, true); o += 4;
    view.setUint16(o, 1, true); o += 2;
    view.setUint16(o, 1, true); o += 2;
    view.setUint32(o, targetRate, true); o += 4;
    view.setUint32(o, targetRate * bytesPerSample, true); o += 4;
    view.setUint16(o, bytesPerSample, true); o += 2;
    view.setUint16(o, 16, true); o += 2;
    writeStr(view, o, 'data'); o += 4;
    view.setUint32(o, dataSize, true); o += 4;
    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(o, Math.round(s * 32767), true);
      o += 2;
    }
    return buffer;
  }
  function writeStr(view, offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  // --- Timer ---
  function startTimer() {
    timerInterval = setInterval(() => {
      duration++;
      segmentElapsed++;
      const m = Math.floor(duration / 60);
      const s = duration % 60;
      timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      if (segmentElapsed >= segmentDuration) rotateSegment();
    }, 1000);
  }

  // --- VU Meter ---
  function updateMeter() {
    if (!analyser) return;
    const freq = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(freq);
    const step = Math.floor(freq.length / NUM_BARS);
    for (let i = 0; i < NUM_BARS; i++) {
      const val = freq[i * step] / 255;
      const h = Math.max(1.5, val * 14);
      bars[i].setAttribute('y', (8 - h / 2).toString());
      bars[i].setAttribute('height', h.toString());
    }
    animFrame = requestAnimationFrame(updateMeter);
  }

  // --- Stop ---
  let stopping = false;
  async function stopRecording() {
    if (stopping) return;
    stopping = true;
    clearInterval(timerInterval);
    cancelAnimationFrame(animFrame);
    recorderEl.classList.add('state-stopping');
    timerEl.textContent = 'Saving...';
    try {
      const blob = await finalizeSegment();
      if (blob.size > 0) {
        segmentCount++;
        try {
          const wavBuffer = await blobToWavBuffer(blob);
          addSegmentToDisk(wavBuffer, segmentElapsed);
        } catch (err) {
          console.error('Final segment failed:', err);
        }
      }
    } catch (err) {
      console.error('Finalize failed:', err);
    }
    if (stream) stream.getTracks().forEach((t) => t.stop());
    setTimeout(() => window.close(), 500);
  }

  ipcRenderer.on('recorder:request-stop', () => stopRecording());
  document.getElementById('stopBtn').addEventListener('click', stopRecording);
</script>
</body>
</html>
